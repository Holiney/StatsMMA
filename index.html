<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FightBase" />
  <title>FightBase — MMA Stats</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f0f0f;
      --bg2: #181818;
      --bg3: #222;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --text2: #999;
      --text3: #666;
      --accent: #e03030;
      --accent-dim: rgba(224,48,48,0.12);
      --win: #3dba58;
      --loss: #e04040;
      --draw: #d4a520;
      --gold: #d4a520;
      --nav-h: 60px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── SCREENS ── */
    .screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
    }
    .screen.hidden { display: none; }

    /* ── TOP BAR ── */
    .topbar {
      padding: 16px 16px 12px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
    }
    .topbar-logo span { color: var(--accent); }
    .topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 0.3px; }

    /* ── SEARCH ── */
    .search-wrap { padding: 12px 16px; }
    .search-box {
      position: relative;
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 10px;
      display: flex;
      align-items: center;
    }
    .search-box svg { position: absolute; left: 12px; color: var(--text3); width: 16px; height: 16px; flex-shrink: 0; }
    .search-box input {
      width: 100%;
      background: none;
      border: none;
      padding: 11px 12px 11px 38px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }
    .search-box input::placeholder { color: var(--text3); }

    /* ── SECTION LABEL ── */
    .section-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 16px 8px;
    }

    /* ── FIGHTER LIST ── */
    .fighter-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

    .fighter-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-user-select: none; user-select: none;
    }
    .fighter-card:active { background: var(--bg3); border-color: var(--border2); }

    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid rgba(224,48,48,0.4);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .avatar.champ {
      background: rgba(212,165,32,0.1);
      border-color: rgba(212,165,32,0.5);
      color: var(--gold);
    }

    .fi-info { flex: 1; min-width: 0; }
    .fi-name {
      font-size: 15px; font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fi-nick { font-weight: 400; font-style: italic; color: var(--text2); }
    .fi-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .fi-record { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
    .rec { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; }
    .rec.w { color: var(--win); }
    .rec.l { color: var(--loss); }
    .rec.d { color: var(--draw); }
    .rec-sep { color: var(--text3); font-size: 11px; }
    .nc-lbl { font-size: 11px; color: var(--text3); }

    .badge {
      font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .badge.champ { background: rgba(212,165,32,0.15); color: var(--gold); border: 0.5px solid rgba(212,165,32,0.3); }
    .badge.rank { background: var(--accent-dim); color: var(--accent); border: 0.5px solid rgba(224,48,48,0.25); }
    .badge.ret { background: rgba(255,255,255,0.06); color: var(--text3); border: 0.5px solid var(--border); }

    /* ── FIGHTER PROFILE ── */
    .profile-topbar {
      padding: 12px 16px 10px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 10px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 4px;
      color: var(--accent); font-size: 14px; font-weight: 500;
      cursor: pointer; padding: 4px 0;
      -webkit-user-select: none; user-select: none;
    }
    .back-btn:active { opacity: 0.6; }
    .back-btn svg { width: 16px; height: 16px; }

    .profile-hero {
      padding: 22px 16px 18px;
      border-bottom: 0.5px solid var(--border);
      display: flex; gap: 16px; align-items: flex-start;
      background: radial-gradient(120% 140% at 0% 0%, rgba(224,48,48,0.10), transparent 55%);
    }
    .profile-hero.champ {
      background: radial-gradient(120% 140% at 0% 0%, rgba(212,165,32,0.12), transparent 55%);
    }
    .profile-avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid rgba(224,48,48,0.5);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px; font-weight: 700; color: var(--accent);
      flex-shrink: 0;
    }
    .profile-avatar.champ { background: rgba(212,165,32,0.1); border-color: rgba(212,165,32,0.5); color: var(--gold); }

    .profile-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 700;
      color: var(--text); letter-spacing: 0.3px;
      line-height: 1.1;
    }
    .profile-nick { font-size: 13px; color: var(--text2); font-style: italic; margin-top: 2px; }
    .profile-div { font-size: 12px; color: var(--text2); margin-top: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .profile-rec-line {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: 0.5px;
      margin-top: 8px; color: var(--text);
    }
    .profile-rec-line .nc { color: var(--text3); font-size: 13px; font-weight: 600; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; padding: 14px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .stat-box {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px; text-align: center;
    }
    .stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700;
    }
    .stat-val.w { color: var(--win); }
    .stat-val.l { color: var(--loss); }
    .stat-val.nc { color: var(--text3); }
    .stat-val.rate { color: var(--accent); }
    .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }

    .methods-section {
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--border);
    }
    .methods-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 10px;
    }
    .methods-title {
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .methods-finish { font-size: 12px; color: var(--text2); }
    .methods-finish strong { color: var(--accent); font-weight: 700; }
    .method-bar {
      display: flex; height: 8px; border-radius: 6px; overflow: hidden;
      background: var(--bg3); gap: 2px;
    }
    .method-bar .seg { min-width: 0; }
    .method-bar .seg.ko { background: var(--accent); }
    .method-bar .seg.sub { background: var(--win); }
    .method-bar .seg.dec { background: var(--text2); }
    .method-legend {
      display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
    }
    .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .leg .dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
    .leg .dot.ko { background: var(--accent); }
    .leg .dot.sub { background: var(--win); }
    .leg .dot.dec { background: var(--text2); }
    .leg b { color: var(--text); font-weight: 700; }

    .fight-history-lbl {
      padding: 14px 16px 8px;
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px;
    }

    .fight-row {
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .fight-res {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700;
      flex-shrink: 0;
    }
    .fight-res.W { background: rgba(61,186,88,0.12); color: var(--win); }
    .fight-res.L { background: rgba(224,64,64,0.12); color: var(--loss); }
    .fight-res.D { background: rgba(212,165,32,0.12); color: var(--draw); }
    .fight-res.NC { background: rgba(255,255,255,0.05); color: var(--text3); }

    .fight-opp { flex: 1; min-width: 0; }
    .fight-opp-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .fight-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .fight-right { text-align: right; flex-shrink: 0; }
    .fight-method { font-size: 13px; font-weight: 600; color: var(--text); }
    .fight-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* ── EVENTS ── */
    .events-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .events-group-lbl {
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 8px 2px 0;
    }
    .events-group-lbl:first-child { padding-top: 0; }

    .event-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .event-head {
      padding: 12px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .event-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.5px;
    }
    .event-date { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .event-venue { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .status-pill {
      font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      white-space: nowrap;
    }
    .status-pill.upcoming { background: var(--accent-dim); color: var(--accent); border: 0.5px solid rgba(224,48,48,0.25); }
    .status-pill.past { background: rgba(255,255,255,0.05); color: var(--text3); border: 0.5px solid var(--border); }

    .main-event-block { padding: 12px 14px; }
    .me-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .matchup { display: flex; align-items: center; gap: 10px; }
    .fighter-side { flex: 1; }
    .fighter-side.right { text-align: right; }
    .me-fighter-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .me-fighter-rec { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .me-result { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
    .me-result.W { background: rgba(61,186,88,0.12); color: var(--win); }
    .me-result.L { background: rgba(224,64,64,0.12); color: var(--loss); }
    .vs-badge {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent-dim); border: 1px solid rgba(224,48,48,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .result-line {
      margin-top: 8px; padding-top: 8px;
      border-top: 0.5px solid var(--border);
      font-size: 11px; color: var(--text3);
    }
    .undercard { padding: 0 14px 10px; display: flex; flex-direction: column; gap: 4px; }
    .undercard-row { font-size: 12px; color: var(--text2); }
    .undercard-row .vs-small { color: var(--text3); }
    .undercard-row .method-small { color: var(--text3); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: var(--bg2);
      border-top: 0.5px solid var(--border);
      display: flex;
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    .nav-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none;
      color: var(--text3);
      font-family: 'Barlow', sans-serif;
      font-size: 10px; font-weight: 500;
      cursor: pointer;
      padding-bottom: var(--safe-bottom);
      -webkit-user-select: none; user-select: none;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── EMPTY / LOADING / ERROR ── */
    .empty {
      text-align: center; padding: 60px 24px;
      color: var(--text3); font-size: 14px;
    }
    .empty svg { width: 36px; height: 36px; margin-bottom: 10px; opacity: 0.4; }

    .state {
      text-align: center; padding: 56px 24px;
      color: var(--text3); font-size: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .spinner {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2.5px solid var(--bg3); border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry-btn {
      margin-top: 4px;
      background: var(--accent-dim); color: var(--accent);
      border: 0.5px solid rgba(224,48,48,0.3); border-radius: 8px;
      padding: 8px 16px; font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .retry-btn:active { opacity: 0.7; }
    .data-note {
      text-align: center; font-size: 10px; color: var(--text3);
      padding: 14px 16px 4px; letter-spacing: 0.3px;
    }
    .skeleton-rec { color: var(--text3); font-style: italic; }
  </style>
</head>
<body>
<div id="app">
  <!-- SEARCH SCREEN -->
  <div class="screen" id="screen-search">
    <div class="topbar">
      <div class="topbar-logo">FIGHT<span>BASE</span></div>
      <div class="topbar-sub">MMA fighter &amp; event database</div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="searchInput" placeholder="Search fighters, nicknames, divisions…" autocomplete="off" autocorrect="off" spellcheck="false" />
      </div>
    </div>
    <div class="section-lbl" id="listLabel">All fighters</div>
    <div class="fighter-list" id="fighterList"></div>
  </div>

  <!-- FIGHTER PROFILE SCREEN -->
  <div class="screen hidden" id="screen-fighter">
    <div class="profile-topbar">
      <div class="back-btn" id="backBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        Back
      </div>
    </div>
    <div id="profileContent"></div>
  </div>

  <!-- EVENTS SCREEN -->
  <div class="screen hidden" id="screen-events">
    <div class="topbar">
      <div class="topbar-logo">FIGHT<span>BASE</span></div>
      <div class="topbar-sub">Recent &amp; upcoming events</div>
    </div>
    <div class="events-list" id="eventsList"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="search" aria-label="Fighters">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Fighters
    </button>
    <button class="nav-btn" data-tab="events" aria-label="Events">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Events
    </button>
  </nav>
</div>

<script>
const API = {
  fighters: '/api/fighters',
  fighter: (id) => `/api/fighter?id=${encodeURIComponent(id)}`,
  events: '/api/events',
};

const PIN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
const SEARCH_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';

let currentTab = 'search';
let roster = [];
let rosterLoaded = false;
let eventsLoaded = false;

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function initials(name) {
  return (name || '').split(' ').map((p) => p[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
}

function fmtDate(d) {
  if (!d) return '';
  const m = d.match(/^([A-Za-z]+)\s*\/\s*(\d+)\s*\/\s*(\d+)$/);
  if (m) return `${m[1]} ${parseInt(m[2], 10)}, ${m[3]}`;
  const dt = new Date(d);
  if (!isNaN(dt.getTime())) return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  return d;
}

function loadingState(txt) {
  return `<div class="state"><div class="spinner"></div><div>${esc(txt)}</div></div>`;
}
function errorState(txt, retryFn) {
  return `<div class="state"><div>${esc(txt)}</div>${retryFn ? `<button class="retry-btn" onclick="${retryFn}()">Retry</button>` : ''}</div>`;
}
function emptyState(txt) {
  return `<div class="empty">${SEARCH_SVG}<div>${esc(txt)}</div></div>`;
}

async function loadRoster() {
  const el = document.getElementById('fighterList');
  el.innerHTML = loadingState('Loading fighters from Sherdog…');
  try {
    const res = await fetch(API.fighters);
    if (!res.ok) throw new Error('bad status');
    const data = await res.json();
    roster = data.fighters || [];
    rosterLoaded = true;
    renderFighterList(document.getElementById('searchInput').value);
  } catch (e) {
    el.innerHTML = errorState('Could not load fighters.', 'loadRoster');
  }
}

function renderFighterList(q) {
  if (!rosterLoaded) return;
  q = (q || '').toLowerCase().trim();
  const filtered = q
    ? roster.filter((f) =>
        f.name.toLowerCase().includes(q) ||
        (f.nick && f.nick.toLowerCase().includes(q)) ||
        (f.div && f.div.toLowerCase().includes(q)))
    : roster;

  document.getElementById('listLabel').textContent =
    q ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''}` : 'All fighters';

  const el = document.getElementById('fighterList');
  if (!filtered.length) { el.innerHTML = emptyState('No fighters found'); return; }

  el.innerHTML = filtered.map((f) => {
    const isChamp = f.ranked === 'Champion';
    const isRet = f.ranked === 'Retired';
    const badgeCls = isChamp ? 'champ' : isRet ? 'ret' : 'rank';
    const badgeTxt = isChamp ? '🏆 Champion' : esc(f.ranked || '');
    let rec;
    if (f.record) {
      const [w, l, d] = f.record;
      rec = `<span class="rec w">${w}W</span><span class="rec-sep">−</span>` +
            `<span class="rec l">${l}L</span><span class="rec-sep">−</span>` +
            `<span class="rec d">${d}D</span>` + (f.nc ? `<span class="nc-lbl">· ${f.nc}NC</span>` : '');
    } else {
      rec = `<span class="skeleton-rec">record unavailable</span>`;
    }
    return `<div class="fighter-card" onclick="showFighter('${esc(f.id)}')">
      <div class="avatar ${isChamp ? 'champ' : ''}">${esc(initials(f.name))}</div>
      <div class="fi-info">
        <div class="fi-name">${esc(f.name)}${f.nick ? ` <span class="fi-nick">"${esc(f.nick)}"</span>` : ''}</div>
        <div class="fi-meta">${esc(f.nat || '')} · ${esc(f.div || '')}</div>
        <div class="fi-record">${rec}</div>
      </div>
      ${f.ranked ? `<span class="badge ${badgeCls}">${badgeTxt}</span>` : ''}
    </div>`;
  }).join('');
}

async function showFighter(id) {
  showScreen('fighter');
  document.getElementById('profileContent').innerHTML = loadingState('Loading fighter…');
  try {
    const res = await fetch(API.fighter(id));
    if (!res.ok) throw new Error('bad status');
    const { fighter } = await res.json();
    renderProfile(fighter);
  } catch (e) {
    document.getElementById('profileContent').innerHTML = errorState('Could not load this fighter.', null);
  }
}

function renderProfile(f) {
  const [w, l, d] = f.record || [0, 0, 0];
  const isChamp = f.ranked === 'Champion';
  const { KO = 0, Sub = 0, Dec = 0 } = f.methods || {};
  const decided = w + l;
  const winRate = decided ? Math.round((w / decided) * 100) : 0;
  const finishRate = w ? Math.round(((KO + Sub) / w) * 100) : 0;
  const ncTxt = [d ? `${d} D` : '', f.nc ? `${f.nc} NC` : ''].filter(Boolean).join(' · ');

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-hero ${isChamp ? 'champ' : ''}">
      <div class="profile-avatar ${isChamp ? 'champ' : ''}">${esc(initials(f.name))}</div>
      <div>
        <div class="profile-name">${esc(f.name)}</div>
        ${f.nick ? `<div class="profile-nick">"${esc(f.nick)}"</div>` : ''}
        <div class="profile-div">
          <span>${esc(f.nat || '')}</span>
          <span>${esc(f.div || '')}</span>
          ${f.ranked ? (isChamp ? '<span style="color:var(--gold)">🏆 Champion</span>' : `<span style="color:var(--text3)">${esc(f.ranked)}</span>`) : ''}
        </div>
        <div class="profile-rec-line">${w}-${l}-${d}${ncTxt ? ` <span class="nc">(${esc(ncTxt)})</span>` : ''}</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val w">${w}</div><div class="stat-lbl">Wins</div></div>
      <div class="stat-box"><div class="stat-val l">${l}</div><div class="stat-lbl">Losses</div></div>
      <div class="stat-box"><div class="stat-val rate">${winRate}%</div><div class="stat-lbl">Win rate</div></div>
    </div>
    <div class="methods-section">
      <div class="methods-head">
        <span class="methods-title">Win methods</span>
        <span class="methods-finish"><strong>${finishRate}%</strong> by finish</span>
      </div>
      <div class="method-bar">
        ${KO ? `<div class="seg ko" style="flex:${KO}"></div>` : ''}
        ${Sub ? `<div class="seg sub" style="flex:${Sub}"></div>` : ''}
        ${Dec ? `<div class="seg dec" style="flex:${Dec}"></div>` : ''}
      </div>
      <div class="method-legend">
        <span class="leg"><span class="dot ko"></span>KO/TKO <b>${KO}</b></span>
        <span class="leg"><span class="dot sub"></span>Submission <b>${Sub}</b></span>
        <span class="leg"><span class="dot dec"></span>Decision <b>${Dec}</b></span>
      </div>
    </div>
    <div class="fight-history-lbl">Fight history · ${(f.fights || []).length} bouts</div>
    ${(f.fights || []).map((fight) => {
      const meta = [fight.round ? `R${esc(fight.round)}` : '', esc(fight.time || '')].filter(Boolean).join(' · ');
      const oppClickable = fight.oppId ? ` onclick="showFighter('${esc(fight.oppId)}')" style="cursor:pointer"` : '';
      return `<div class="fight-row">
        <div class="fight-res ${esc(fight.r)}">${esc(fight.r)}</div>
        <div class="fight-opp"${oppClickable}>
          <div class="fight-opp-name">${esc(fight.opp)}</div>
          <div class="fight-sub">${esc(fight.event)} · ${esc(fmtDate(fight.date))}</div>
        </div>
        <div class="fight-right">
          <div class="fight-method">${esc(fight.method)}</div>
          <div class="fight-meta">${meta}</div>
        </div>
      </div>`;
    }).join('')}
    <div class="data-note">Live data from Sherdog.com</div>
    <div style="height:12px"></div>`;
}

function eventCard(ev) {
  const sides = ev.headline ? ev.headline.split(/\s+vs\.?\s+/i).map((s) => s.trim()).filter(Boolean) : [];
  let matchup = '';
  if (sides.length === 2) {
    matchup = `<div class="matchup">
      <div class="fighter-side"><div class="me-fighter-name">${esc(sides[0])}</div></div>
      <div class="vs-badge">VS</div>
      <div class="fighter-side right"><div class="me-fighter-name">${esc(sides[1])}</div></div>
    </div>`;
  } else if (ev.headline) {
    matchup = `<div class="me-fighter-name">${esc(ev.headline)}</div>`;
  }
  return `<div class="event-card">
    <div class="event-head">
      <div>
        <div class="event-name">${esc(ev.title || ev.name)}</div>
        <div class="event-date">${esc(fmtDate(ev.date))}</div>
        ${ev.location ? `<div class="event-venue">${PIN_SVG} ${esc(ev.location)}</div>` : ''}
      </div>
      <span class="status-pill ${ev.status}">${ev.status === 'upcoming' ? 'Upcoming' : 'Past'}</span>
    </div>
    ${matchup ? `<div class="main-event-block"><div class="me-label">Main event</div>${matchup}</div>` : ''}
  </div>`;
}

async function loadEvents() {
  const el = document.getElementById('eventsList');
  el.innerHTML = loadingState('Loading events from Sherdog…');
  try {
    const res = await fetch(API.events);
    if (!res.ok) throw new Error('bad status');
    const data = await res.json();
    let html = '';
    if (data.upcoming && data.upcoming.length) html += `<div class="events-group-lbl">Upcoming</div>` + data.upcoming.map(eventCard).join('');
    if (data.past && data.past.length) html += `<div class="events-group-lbl">Past results</div>` + data.past.map(eventCard).join('');
    el.innerHTML = html || emptyState('No events');
    eventsLoaded = true;
  } catch (e) {
    el.innerHTML = errorState('Could not load events.', 'loadEvents');
  }
}

function showScreen(name) {
  ['search', 'fighter', 'events'].forEach((s) => {
    const el = document.getElementById(`screen-${s}`);
    if (el) el.classList.toggle('hidden', s !== name);
  });
}

function showTab(tab) {
  currentTab = tab;
  showScreen(tab);
  document.querySelectorAll('.nav-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  if (tab === 'events' && !eventsLoaded) loadEvents();
}

document.getElementById('searchInput').addEventListener('input', (e) => renderFighterList(e.target.value));
document.getElementById('backBtn').addEventListener('click', () => showTab(currentTab));
document.querySelectorAll('.nav-btn').forEach((btn) => {
  btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

loadRoster();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
